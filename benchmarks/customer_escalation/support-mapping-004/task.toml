repo = "grafana"
confidence = 0.85
source = "deterministic"

[[ground_truth.required_files]]
path = "dispatch/dispatch.go"
repo = "alertmanager"
confidence = 0.85
source = "deterministic"

[[ground_truth.required_files]]
path = "notify/notify.go"
repo = "alertmanager"
confidence = 0.80
source = "deterministic"

[[ground_truth.sufficient_files]]
