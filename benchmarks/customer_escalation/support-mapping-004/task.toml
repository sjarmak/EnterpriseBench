difficulty_stratum = "dual_repo"
mcp_suite = "eb_v1"
repo_set_id = "observability-ecosystem"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "support-map-grafana-alerts-004"
suite = "customer_escalation"
difficulty = "hard"
estimated_duration_minutes = 40
session_type = "single"
task_type = "support_code_mapping"
description = "Map customer-reported late or missing alert notifications to Grafana alert scheduler and Alertmanager notification pipeline"
prompt = "See instruction.md"

[[repos]]
url = "https://github.com/grafana/grafana"
rev = "v10.2.0"
path = "grafana"
role = "primary"

[[repos]]
url = "https://github.com/prometheus/alertmanager"
rev = "v0.26.0"
path = "alertmanager"
role = "dependency"

[metadata]
languages = ["go"]
dependency_depth = 2
frameworks = ["grafana", "alertmanager"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "code_paths"
weight = 0.40
verifier = "checks/check_code_paths.sh"
description = "Agent identifies the alert scheduler and evaluation engine code paths in Grafana and Alertmanager"
timeout_seconds = 120

[[checkpoints]]
name = "ownership"
weight = 0.20
verifier = "checks/check_ownership.sh"
description = "Agent identifies the ngalert/schedule subsystem in Grafana and dispatch/notify subsystem in Alertmanager"
timeout_seconds = 60

[[checkpoints]]
name = "severity"
weight = 0.15
verifier = "checks/check_severity.sh"
description = "Agent correctly assesses severity considering both scheduler delays and notification pipeline failures"
timeout_seconds = 60

[[checkpoints]]
name = "related_issues"
weight = 0.25
verifier = "checks/check_related_issues.sh"
description = "Agent identifies related source files across both Grafana and Alertmanager repos"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["kb_article", "reproduction_script"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/support-map-grafana-alerts-004.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Cross-repo navigation needed: tracing alert flow from Grafana scheduler through Alertmanager dispatch and notification pipeline requires understanding integration points across both repositories"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "pkg/services/ngalert/schedule/schedule.go"
repo = "grafana"
confidence = 0.95
source = "deterministic"

