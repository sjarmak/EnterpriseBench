difficulty_stratum = "large_single"

[task]
id = "error-trace-k8s-nftables-sync-001"
suite = "customer_escalation"
difficulty = "hard"
estimated_duration_minutes = 45
session_type = "single"
task_type = "error_provenance"
description = "Trace kube-proxy nftables sync failure through vendor library"
prompt = "See instruction.md"

[[repos]]
url = "github.com/kubernetes/kubernetes"
rev = "v1.33.0-alpha.2"
path = "kubernetes"
role = "primary"

[metadata]
languages = ["go"]
frameworks = ["kubernetes", "nftables"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "error_source"
weight = 0.40
verifier = "checks/check_error_source.sh"
description = "Agent identifies the exact source file and function that generates the error"
timeout_seconds = 120

[[checkpoints]]
name = "error_chain"
weight = 0.30
verifier = "checks/check_error_chain.sh"
description = "Agent traces the error propagation chain from source to user-visible output"
timeout_seconds = 120

[[checkpoints]]
name = "trigger_conditions"
weight = 0.30
verifier = "checks/check_trigger_conditions.sh"
description = "Agent identifies the conditions that trigger this error"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["code_patch"]

[tool_access]
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "Error wraps through kube-proxy into the vendored knftables library; cross-package boundary tracing benefits from MCP, though the single-repo layout keeps discovery straightforward"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "pkg/proxy/nftables/proxier.go"
repo = "kubernetes"
confidence = 0.9
source = "deterministic"

[[ground_truth.required_files]]
path = "vendor/sigs.k8s.io/knftables/nftables.go"
repo = "kubernetes"
confidence = 0.85
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "go.mod"
repo = "kubernetes"
confidence = 0.5

[[ground_truth.sufficient_files]]
path = "go.sum"
repo = "kubernetes"
confidence = 0.4
