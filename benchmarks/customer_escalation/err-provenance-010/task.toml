difficulty_stratum = "large_single"

[task]
id = "error-trace-grafana-jaeger-panic-001"
suite = "customer_escalation"
difficulty = "hard"
estimated_duration_minutes = 35
session_type = "single"
task_type = "error_provenance"
description = "Trace Jaeger datasource panic on empty trace response"
prompt = "See instruction.md"

[[repos]]
url = "github.com/grafana/grafana"
rev = "v10.2.0"
path = "grafana"
role = "primary"

[metadata]
languages = ["go"]
frameworks = ["grafana", "jaeger"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "error_source"
weight = 0.40
verifier = "checks/check_error_source.sh"
description = "Agent identifies the exact source file and function that generates the error"
timeout_seconds = 120

[[checkpoints]]
name = "error_chain"
weight = 0.30
verifier = "checks/check_error_chain.sh"
description = "Agent traces the error propagation chain from source to user-visible output"
timeout_seconds = 120

[[checkpoints]]
name = "trigger_conditions"
weight = 0.30
verifier = "checks/check_trigger_conditions.sh"
description = "Agent identifies the conditions that trigger this error"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["code_patch"]

[tool_access]
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "Panic points to the file but not the condition; MCP helps navigate Jaeger response types and query pipeline"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "pkg/tsdb/jaeger/client.go"
repo = "grafana"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "pkg/tsdb/jaeger/client_test.go"
repo = "grafana"
confidence = 0.85
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "pkg/tsdb/jaeger/trace.go"
repo = "grafana"
confidence = 0.55
