timeout_seconds = 120

[[checkpoints]]
name = "error_chain"
weight = 0.30
verifier = "checks/check_error_chain.sh"
description = "Agent traces the error propagation chain from source to user-visible output"
timeout_seconds = 120

[[checkpoints]]
name = "trigger_conditions"
weight = 0.30
verifier = "checks/check_trigger_conditions.sh"
description = "Agent identifies the conditions that trigger this error"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["code_patch"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/error-trace-tf-backend-nilptr-001.json"
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "Panic hides the real error (permission denied); MCP helps trace backend state retrieval through GCS SDK path, but Terraform is a moderately-sized repo where the migration command and backend packages are discoverable via grep"

[ground_truth]
tiers = ["deterministic"]

