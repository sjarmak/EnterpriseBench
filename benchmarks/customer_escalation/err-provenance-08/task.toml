difficulty_stratum = "large_single"

[task]
id = "error-trace-tf-backend-nilptr-001"
suite = "customer_escalation"
difficulty = "hard"
estimated_duration_minutes = 40
session_type = "single"
task_type = "error_provenance"
description = "Trace nil pointer panic during backend migration with permission error"
prompt = "See instruction.md"

[[repos]]
url = "https://github.com/hashicorp/terraform"
rev = "v1.10.0"
path = "terraform"
