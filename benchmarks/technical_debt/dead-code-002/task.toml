description = "Identify dead code from permanently-enabled enableRenderableContext feature flag in React"
prompt = """
# Task: Dead Code / Feature Flag Necropsy — React enableRenderableContext

## Background
React uses feature flags to gate experimental features. When a feature flag becomes permanently enabled, the `else` branches guarded by that flag become dead code. Your job is to identify the dead branches and related dead code left behind by the `enableRenderableContext` feature flag.

## Objective
Analyze the React codebase and identify:
1. Feature flags that are permanently on or off
2. Dead branches in files that check these flags
3. Dead symbols (types, functions, constants) that only exist to support the dead branches
4. Any dead feature flag fork files

## Output Format
Write your findings to `/workspace/react/dead_code_report.json` as a JSON array:
```json
[
  {
    "file": "path/to/file.js",
    "symbol": "functionName or branch description",
    "kind": "function|class|method|export|branch",
    "confidence": "high|medium|low",
    "evidence": "explanation"
  }
]
```

## Key Areas to Investigate
- `packages/shared/ReactFeatureFlags.js` and all fork files in `packages/shared/forks/`
- `packages/react/src/ReactContext.js` — context provider/consumer logic
- `packages/react-reconciler/src/` — fiber creation and begin work
- `packages/react-server/src/ReactFizzServer.js`
- `packages/react-is/src/ReactIs.js`
- `packages/shared/ReactSymbols.js`

## Success Criteria
- Precision ≥ 0.9, Recall ≥ 0.6
- Must identify the primary feature flag by name
- Evidence must explain why branches are dead
"""

