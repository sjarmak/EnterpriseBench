difficulty_stratum = "large_single"

[task]
id = "dead-code-004"
suite = "technical_debt"
task_type = "dead_code_necropsy"
difficulty = "expert"
estimated_duration_minutes = 45
session_type = "single"
description = "Identify unused exports and dead code across the TypeScript compiler"
prompt = """
# Task: Dead Code / Feature Flag Necropsy — TypeScript Compiler Dead Exports

## Background
The TypeScript compiler codebase (~900K LoC) has accumulated unused exports and dead utility functions over years of development. Your job is to systematically identify these.

## Objective
Analyze the TypeScript compiler source and identify:
1. Exported functions that are never imported by any other module
2. Dead utility functions in core.ts, utilities.ts, utilitiesPublic.ts
3. Unused type definitions and interfaces
4. Dead helper functions in factory modules

## Output Format
Write your findings to `/workspace/TypeScript/dead_code_report.json` as a JSON array:
```json
[
  {
    "file": "src/compiler/core.ts",
    "symbol": "functionName",
    "kind": "function|export|type",
    "confidence": "high|medium|low",
    "evidence": "explanation"
  }
]
```

## Key Areas to Investigate
- `src/compiler/core.ts` — core utility functions (many unused)
- `src/compiler/utilities.ts` — compiler utilities (193 lines of dead code)
- `src/compiler/utilitiesPublic.ts` — public utilities
- `src/compiler/factory/utilities.ts` — factory helpers
- `src/compiler/factory/emitHelpers.ts` — emit helper dead code
- `src/compiler/types.ts` — unused type definitions
- `src/compiler/corePublic.ts` — dead public exports
- `src/services/utilities.ts` — service layer dead exports
- `src/server/utilities.ts` — server dead exports

## Success Criteria
- Precision ≥ 0.9, Recall ≥ 0.6
- Must find dead exports in at least 5 different files
- Evidence must show zero importers/callers
"""

