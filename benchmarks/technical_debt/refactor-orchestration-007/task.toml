# Refactor Orchestration: grpc.Dial -> grpc.NewClient API migration cascade

difficulty_stratum = "tri_repo"
mcp_suite = "eb_v1"
repo_set_id = "kubernetes-ecosystem"
org_scale = true
verification_modes = ["deterministic", "llm_curator"]

[task]
id = "refactor-orch-007"
suite = "technical_debt"
task_type = "refactor_orchestration"
difficulty = "expert"
estimated_duration_minutes = 50
session_type = "single"
description = "Plan the ordering for grpc.Dial to grpc.NewClient API migration across grpc-go, etcd, and Kubernetes"
prompt = """
grpc-go deprecated the grpc.Dial and grpc.DialContext APIs in v1.64 (2024-06),
replacing them with grpc.NewClient. This is a significant API migration that
cascades through the Go gRPC ecosystem:

  grpc-go (deprecation) -> etcd (migration) -> kubernetes (client update)

The migration is not a simple version bump — it requires:
- Replacing all grpc.Dial/DialContext calls with grpc.NewClient
- Updating connection management patterns (NewClient is non-blocking by default)
- Preserving timeout/health-check behavior that relied on Dial's blocking semantics
- etcd wraps grpc in its client library, which Kubernetes consumes

Your task is to produce a topologically sorted execution plan:

1. Identify all repos requiring API migration and in what order.
2. Map the dependency relationships.
3. Produce a numbered, ordered list of repos to migrate.
4. Identify any steps that can be done in parallel.
5. Detail the API changes required at each level.

Write your plan to /workspace/REFACTOR_PLAN.md with:
- Numbered ordering of repos to migrate
- Dependency graph explanation
- API migration details per repo (Dial -> NewClient patterns)
- Parallelization annotations
- Behavioral differences to address (blocking vs non-blocking)
"""

[[repos]]
url = "https://github.com/grpc/grpc-go"
rev = "v1.79.0"
path = "grpc-go"
role = "upstream"

[[repos]]
url = "https://github.com/etcd-io/etcd"
rev = "v3.5.17"
path = "etcd"
role = "intermediary"

[[repos]]
url = "https://github.com/kubernetes/kubernetes"
rev = "v1.33.0"
path = "kubernetes"
role = "consumer"

[metadata]
languages = ["go"]
total_loc = 5200000
dependency_depth = 3
frameworks = ["grpc", "etcd", "kubernetes"]
multi_repo_pattern = "orchestrate"

[[checkpoints]]
name = "identify_repos"
weight = 0.25
verifier = "checks/check_repo_set.sh"
description = "Agent identifies all repos requiring API migration"
timeout_seconds = 30

[[checkpoints]]
name = "topological_order"
weight = 0.45
verifier = "checks/check_topo_order.sh"
description = "Agent produces valid topological ordering"
timeout_seconds = 60

[[checkpoints]]
name = "parallelism"
weight = 0.30
verifier = "checks/check_parallelism.sh"
description = "Agent correctly identifies parallelizable steps"
timeout_seconds = 60

[artifacts]
required = ["answer", "topological_order"]
optional = ["migration_guide"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/refactor-orch-007.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Finding all grpc.Dial call sites across 3 repos and understanding wrapper layers requires cross-repo code search"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "clientv3/client.go"
repo = "etcd"
confidence = 0.90
source = "deterministic"

[[ground_truth.required_files]]
path = "go.mod"
repo = "kubernetes"
confidence = 0.95
source = "deterministic"
