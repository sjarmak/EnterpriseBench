difficulty_stratum = "large_single"

[task]
id = "dead-code-001"
suite = "technical_debt"
task_type = "dead_code_necropsy"
difficulty = "hard"
estimated_duration_minutes = 30
session_type = "single"
description = "Identify dead code from the legacy event system in React"
prompt = """
# Task: Dead Code / Feature Flag Necropsy — React Legacy Event System

## Background
React migrated from a legacy event system to a modern event system. After the migration, several files and functions in the legacy event system became dead code — no longer called by any part of the codebase. Your job is to identify this dead code.

## Objective
Analyze the React codebase and identify dead code related to the legacy event system. Specifically:
1. Identify files that are entirely dead (no remaining importers/callers)
2. Identify functions and exports within live files that are no longer called
3. Identify any feature flags that are permanently on/off, making their conditional branches dead
4. Provide evidence for each item (e.g., "zero callers found across entire codebase")

## Output Format
Write your findings to `/workspace/react/dead_code_report.json` as a JSON array:
```json
[
  {
    "file": "path/to/file.js",
    "symbol": "functionName or default (for entire file)",
    "kind": "function|class|method|file|export",
    "confidence": "high|medium|low",
    "evidence": "explanation of why this is dead code"
  }
]
```

## Key Areas to Investigate
- `packages/react-dom/src/legacy-events/` directory
- `packages/react-dom/src/events/` — look for unused exports
- `packages/react-dom/src/client/` — check for dead injection code
- Event pooling related code (getPooled, destructor, etc.)
- `packages/react-dom/src/test-utils/` — dead helper functions

## Success Criteria
- Precision ≥ 0.9 (don't flag live code as dead)
- Recall ≥ 0.6 (find most of the actual dead code)
- Evidence must explain why each item is unreachable
"""

