difficulty_stratum = "large_single"
mcp_suite = "eb_v1"
repo_set_id = "hashicorp-ecosystem"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "error-trace-tf-builtin-schema-001"
suite = "customer_escalation"
difficulty = "hard"
estimated_duration_minutes = 25
session_type = "single"
task_type = "error_provenance"
description = "Trace spurious ERROR log for builtin terraform provider schema"
prompt = "See instruction.md"

[[repos]]
url = "https://github.com/hashicorp/terraform"
rev = "v1.6.0"
path = "terraform"
role = "primary"

[metadata]
languages = ["go"]
frameworks = ["terraform"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "error_source"
weight = 0.40
verifier = "checks/check_error_source.sh"
description = "Agent identifies the exact source file and function that generates the error"
timeout_seconds = 120

[[checkpoints]]
name = "error_chain"
weight = 0.30
verifier = "checks/check_error_chain.sh"
description = "Agent traces the error propagation chain from source to user-visible output"
timeout_seconds = 120

[[checkpoints]]
name = "trigger_conditions"
weight = 0.30
verifier = "checks/check_trigger_conditions.sh"
description = "Agent identifies the conditions that trigger this error"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["code_patch"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/error-trace-tf-builtin-schema-001.json"
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "The error string is easy to locate, but tracing it to the builtin Terraform provider requires understanding the schema transform pipeline and how providers are registered"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "internal/builtin/providers/terraform/provider.go"
repo = "terraform"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "internal/builtin/providers/terraform/provider_test.go"
repo = "terraform"
confidence = 0.8
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "internal/terraform/transform_attach_schema.go"
repo = "terraform"
confidence = 0.65
