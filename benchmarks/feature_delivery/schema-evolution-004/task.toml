# DB Schema Evolution: Move Default Avatar Source from User to Realm (Zulip)

difficulty_stratum = "large_single"
mcp_suite = "eb_v1"
repo_set_id = "zulip-platform"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "schema-evolution-004"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "hard"
estimated_duration_minutes = 40
session_type = "single"
description = "Trace impact of moving default_avatar_source from UserProfile to Realm model in Zulip"
prompt = """
We're moving the `default_avatar_source` field from the `UserProfile` model to the
`Realm` model. This makes avatar source configuration a realm-level setting rather
than per-user. A Django migration has been created for this change.

Your task:
1. Identify the schema change — field removal from UserProfile, addition to Realm.
2. Find all code that directly references avatar source logic — the avatar library,
   model definitions, API examples.
3. Find indirect references — all importers (Slack, Mattermost, Rocket.Chat) that
   set avatar source during import, frontend templates, and dependency changes.
4. Identify test files that cover avatar and importer functionality.

Write your analysis to /workspace/zulip/SCHEMA_IMPACT.md.
"""

[[repos]]
url = "https://github.com/zulip/zulip"
rev = "f2a5dc949a7c0ec776b3729b2c92703292404127"
path = "zulip"
role = "primary"

[metadata]
languages = ["python", "javascript"]
total_loc = 500_000
dependency_depth = 1
frameworks = ["django"]

[[checkpoints]]
name = "identify_schema_change"
weight = 0.10
verifier = "checks/check_schema_change.sh"
description = "Agent identifies the migration and field movement between models"
timeout_seconds = 60

[[checkpoints]]
name = "find_direct_refs"
weight = 0.35
verifier = "checks/check_direct_refs.sh"
description = "Agent finds direct references: avatar lib, both model files, API examples"
timeout_seconds = 60

[[checkpoints]]
name = "find_indirect_refs"
weight = 0.35
verifier = "checks/check_indirect_refs.sh"
description = "Agent finds importer files and frontend templates that reference avatar source"
timeout_seconds = 60

[[checkpoints]]
name = "identify_test_impact"
weight = 0.20
verifier = "checks/check_test_impact.sh"
description = "Agent identifies test files for avatar and importer functionality"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["code_patch"]

[tool_access]
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "Moving default_avatar_source between UserProfile and Realm requires finding all references in avatar logic, importers, and frontend templates; single-codebase layout keeps text search effective"

