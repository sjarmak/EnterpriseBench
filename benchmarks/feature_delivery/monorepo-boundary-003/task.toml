# Monorepo Boundary: Babel Decorator Metadata + TS Tuple Labels

difficulty_stratum = "monorepo_cross_package"

[task]
id = "monorepo-boundary-babel-metadata-003"
suite = "feature_delivery"
task_type = "monorepo_boundary"
difficulty = "hard"
estimated_duration_minutes = 35
session_type = "single"
description = "Trace combined impact of decorator metadata support and TS tuple label relaxation across babel packages"
prompt = """
Two features are landing in the babel v7.23.0 release:

1. Decorator metadata support in `@babel/helper-create-class-features-plugin`
   (affects helpers and the decorators plugin)
2. TypeScript tuple label relaxation in `@babel/types` — allowing mixed
   labeled and unlabeled tuple elements (affects the parser)

Your task:
1. Identify all sibling packages affected by either or both changes.
2. Classify the impact per package as none/patch/minor/major.
3. Identify specific boundary violations — files where these changes cross
   package boundaries.

Write your analysis to /workspace/babel/IMPACT_REPORT.md.
"""

[[repos]]
url = "github.com/babel/babel"
rev = "v7.22.20"
path = "babel"
role = "primary"

[metadata]
languages = ["typescript", "javascript"]
total_loc = 450_000
dependency_depth = 1
frameworks = ["babel"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "identify_affected_packages"
weight = 0.25
verifier = "checks/check_affected_packages.sh"
description = "Agent identifies @babel/helpers, @babel/plugin-proposal-decorators, and @babel/parser"
timeout_seconds = 60

[[checkpoints]]
name = "classify_change_impact"
weight = 0.45
verifier = "checks/check_impact_classification.sh"
description = "Agent classifies all three affected packages as minor"
timeout_seconds = 60

[[checkpoints]]
name = "identify_boundary_violations"
weight = 0.30
verifier = "checks/check_boundary_violations.sh"
description = "Agent identifies applyDecs2305.js, transformer-2023-05.ts, and typescript/index.ts"
timeout_seconds = 60

[artifacts]
required = ["answer"]

[tool_access]
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "Two independent changes converging requires tracing decorator helper chains and TypeScript parser plugin boundaries; text search handles most of the discovery in this well-structured monorepo"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "packages/babel-helpers/src/helpers/applyDecs2305.js"
repo = "babel"
confidence = 0.96
source = "deterministic"

[[ground_truth.required_files]]
path = "packages/babel-plugin-proposal-decorators/src/transformer-2023-05.ts"
repo = "babel"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "packages/babel-parser/src/plugins/typescript/index.ts"
repo = "babel"
confidence = 0.95
source = "deterministic"

[[ground_truth.sufficient_files]]
