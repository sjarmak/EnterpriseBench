# DB Schema Evolution: Dashboard Last Visited Tracking (Sentry)

difficulty_stratum = "large_single"

[task]
id = "schema-evolution-009"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "medium"
estimated_duration_minutes = 30
session_type = "single"
description = "Trace impact of creating DashboardLastVisited model across Sentry's Django backend and React frontend"
prompt = """
We're adding per-user dashboard visit tracking by creating a `DashboardLastVisited`
model. The migration is `src/sentry/migrations/0947_add_dashboard_last_visited_model.py`.

Your task:
1. Identify the schema change — new model creation and migration.
2. Find all backend references — the dashboard model file, backup comparators,
   and test utilities for backups.
3. Find frontend references — the React table component that displays dashboards
   with "last visited" sorting, and the TypeScript types file.
4. Identify test files, especially frontend component specs.

Write your analysis to /workspace/sentry/SCHEMA_IMPACT.md.
"""

