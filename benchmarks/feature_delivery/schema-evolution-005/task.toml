# DB Schema Evolution: Sync Reviewable Claimed Status (Discourse)

difficulty_stratum = "large_single"

[task]
id = "schema-evolution-005"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "expert"
estimated_duration_minutes = 60
session_type = "single"
description = "Trace impact of adding automatic boolean to ReviewableClaimedTopic across Discourse's Rails MVC stack"
prompt = """
We're adding an `automatic` boolean column to the `ReviewableClaimedTopic` model to
distinguish between manually claimed and automatically claimed review topics. The
migration is `db/migrate/20250319024514_add_automatic_to_reviewable_claimed_topic.rb`.

Your task:
1. Identify the schema change and migration.
2. Find all direct model and controller references — the Reviewable model hierarchy,
   controllers for reviewables and claimed topics.
3. Find indirect references — serializers (3 of them), guardian authorization,
   frontend JavaScript components and routes, locale strings.
4. Identify all spec files that need updating.

Write your analysis to /workspace/discourse/SCHEMA_IMPACT.md.
"""

