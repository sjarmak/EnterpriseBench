# Monorepo Boundary: Next.js ImageResponse Move to next/og

difficulty_stratum = "monorepo_cross_package"

[task]
id = "monorepo-boundary-nextjs-og-008"
suite = "feature_delivery"
task_type = "monorepo_boundary"
difficulty = "hard"
estimated_duration_minutes = 25
session_type = "single"
description = "Trace impact of moving ImageResponse from next/server to next/og across JS and Rust SWC boundaries"
prompt = """
For Next.js v14.0.0, `ImageResponse` is being moved from `next/server` to
`next/og`. The change is in the `next` package — new entry points `og.js`
and `og.d.ts`, updated webpack config, and middleware plugin changes.

This crosses a language boundary: the Rust-based SWC compiler has its own
import map that resolves `next/*` paths.

Your task:
1. Identify all packages/crates in the monorepo that reference ImageResponse
   or the next/server export path and need updating.
2. Classify the impact per package as none/patch/minor/major.
3. Identify specific boundary violations — files where the old import path
   is hardcoded, especially in the Rust SWC crate.

Write your analysis to /workspace/next.js/IMPACT_REPORT.md.
"""

[[repos]]
url = "https://github.com/vercel/next.js"
rev = "v13.5.6"
path = "next.js"
role = "primary"

[metadata]
languages = ["typescript", "rust"]
total_loc = 1_200_000
dependency_depth = 1
frameworks = ["next.js", "swc"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "identify_affected_packages"
weight = 0.25
verifier = "checks/check_affected_packages.sh"
description = "Agent identifies @next/swc (next-core crate) as affected"
timeout_seconds = 60

[[checkpoints]]
name = "classify_change_impact"
weight = 0.45
verifier = "checks/check_impact_classification.sh"
description = "Agent classifies @next/swc as major (import map is a breaking API change)"
timeout_seconds = 60

[[checkpoints]]
name = "identify_boundary_violations"
weight = 0.30
verifier = "checks/check_boundary_violations.sh"
description = "Agent identifies next_import_map.rs as a cross-language boundary violation"
timeout_seconds = 60

[artifacts]
required = ["answer"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/monorepo-boundary-nextjs-og-008.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Cross-language boundary (TypeScript → Rust) requires finding import map references in SWC crate that text search may miss due to different naming conventions"

