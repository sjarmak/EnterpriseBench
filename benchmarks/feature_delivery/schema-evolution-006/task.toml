# DB Schema Evolution: Add Description to Invites (Discourse)

difficulty_stratum = "large_single"

[task]
id = "schema-evolution-006"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "medium"
estimated_duration_minutes = 30
session_type = "single"
description = "Trace impact of adding a description column to the Invite model across Discourse's Rails stack"
prompt = """
We're adding a `description` text column to the `Invite` model so admins can
annotate invites with notes about who they're for. The migration is
`db/migrate/20250614020437_add_description_to_invites.rb`.

Your task:
1. Identify the schema change and migration.
2. Find all direct references — the Invite model, controller, and serializer.
3. Find indirect references — frontend components (the create-invite modal,
   the invited-show template), locale strings, CSS, and the constants file.
4. Identify all spec files that need updating, including system tests.

Write your analysis to /workspace/discourse/SCHEMA_IMPACT.md.
"""

