# Monorepo Boundary: Rust Compiler Static Initializers in Metadata

difficulty_stratum = "monorepo_cross_package"
mcp_suite = "eb_v1"
repo_set_id = "rust-compiler-ecosystem"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "monorepo-boundary-rustc-statics-010"
suite = "feature_delivery"
task_type = "monorepo_boundary"
difficulty = "hard"
estimated_duration_minutes = 40
session_type = "single"
description = "Trace impact of changing static initializer representation from MIR to metadata across compiler crates"
prompt = """
A representation change is being made in `rustc_middle`: static initializers
will be stored directly in metadata instead of as MIR bodies. The core changes
are in `compiler/rustc_middle/src/mir/` — new interpret error types, query
changes, and MIR representation updates.

This affects the compiler pipeline from metadata encoding through const
evaluation to code generation.

Your task:
1. Identify all compiler crates affected by this representation change.
2. Classify the impact per crate as none/patch/minor/major.
3. Identify specific boundary violations — files where static initializer
   handling crosses crate boundaries.

Write your analysis to /workspace/rust/IMPACT_REPORT.md.
"""

[[repos]]
url = "https://github.com/rust-lang/rust"
rev = "1.76.0"
path = "rust"
role = "primary"

[metadata]
languages = ["rust"]
total_loc = 3_500_000
dependency_depth = 1
frameworks = ["rustc"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "identify_affected_packages"
weight = 0.25
verifier = "checks/check_affected_packages.sh"
description = "Agent identifies at least 3 of 4 affected crates (rustc_const_eval, rustc_metadata, rustc_mir_transform, miri)"
timeout_seconds = 90

[[checkpoints]]
name = "classify_change_impact"
weight = 0.45
verifier = "checks/check_impact_classification.sh"
description = "Agent classifies affected crates as minor (internal representation change, not public API)"
timeout_seconds = 60

[[checkpoints]]
name = "identify_boundary_violations"
weight = 0.30
verifier = "checks/check_boundary_violations.sh"
description = "Agent identifies const_eval/eval_queries.rs, metadata/rmeta/encoder.rs, and mir/mod.rs"
timeout_seconds = 60

[artifacts]
required = ["answer"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/monorepo-boundary-rustc-statics-010.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "MIR representation changes cascade through the compiler pipeline — semantic navigation traces query system dependencies that text search cannot"

