# DB Schema Evolution: Category Approval Groups (Discourse)

difficulty_stratum = "large_single"

[task]
id = "schema-evolution-007"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "hard"
estimated_duration_minutes = 40
session_type = "single"
description = "Trace impact of normalizing category approval booleans into a CategoryApprovalGroup join table in Discourse"
prompt = """
We're normalizing the category approval system. Instead of boolean columns on
CategorySetting, we're creating a `CategoryApprovalGroup` join table. This is a
two-phase migration:
1. `20260310072550_mark_category_approval_booleans_readonly.rb` — marks old booleans readonly
2. `20260310072759_create_category_approval_groups.rb` — creates the new join table

Your task:
1. Identify both migration files and understand the two-phase approach.
2. Find all model files that reference category approval logic — Category,
   CategoryPostingReviewGroup, CategorySetting.
3. Find indirect references — the bulk import merger script that handles
   category data during imports.
4. Identify all spec files, including migration-specific specs.

Write your analysis to /workspace/discourse/SCHEMA_IMPACT.md.
"""

