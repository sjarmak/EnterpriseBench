# Monorepo Boundary: pnpm Lifecycle Scripts Allow-List

difficulty_stratum = "monorepo_cross_package"

[task]
id = "monorepo-boundary-pnpm-lifecycle-006"
suite = "feature_delivery"
task_type = "monorepo_boundary"
difficulty = "hard"
estimated_duration_minutes = 30
session_type = "single"
description = "Trace impact of lifecycle script allow-list default change through pnpm config consumers"
prompt = """
For pnpm v10.0.0, a security hardening change is being made: lifecycle scripts
now require an explicit allow-list by default. The change is in `@pnpm/config`
at `config/config/src/getOptionsFromRootManifest.ts`.

This is a default value change in a config package — the code path exists but
the behavior flip affects every package that reads this setting.

Your task:
1. Identify all workspace packages that consume the lifecycle script config
   and would be affected by this default change.
2. Classify the impact per package as none/patch/minor/major.
3. Identify specific boundary violations — files where the old default is
   assumed or tested.

Write your analysis to /workspace/pnpm/IMPACT_REPORT.md.
"""

[[repos]]
url = "github.com/pnpm/pnpm"
rev = "v9.15.0"
path = "pnpm"
role = "primary"

[metadata]
languages = ["typescript"]
total_loc = 350_000
dependency_depth = 1
frameworks = ["pnpm"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "identify_affected_packages"
weight = 0.25
verifier = "checks/check_affected_packages.sh"
description = "Agent identifies plugin-commands-installation and pnpm CLI as affected"
timeout_seconds = 60

[[checkpoints]]
name = "classify_change_impact"
weight = 0.45
verifier = "checks/check_impact_classification.sh"
description = "Agent classifies affected packages as major (breaking behavioral change)"
timeout_seconds = 60

[[checkpoints]]
name = "identify_boundary_violations"
weight = 0.30
verifier = "checks/check_boundary_violations.sh"
description = "Agent identifies getOptionsFromRootManifest.ts and lifecycle script test files"
timeout_seconds = 60

[artifacts]
required = ["answer"]

[tool_access]
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Config value consumption is spread across packages via function calls, not just imports — semantic navigation traces actual usage"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "config/config/src/getOptionsFromRootManifest.ts"
repo = "pnpm"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "pnpm/test/install/lifecycleScripts.ts"
repo = "pnpm"
confidence = 0.95
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "exec/plugin-commands-rebuild/test/index.ts"
repo = "pnpm"
confidence = 0.85

[[ground_truth.sufficient_files]]
path = "pnpm/test/monorepo/index.ts"
repo = "pnpm"
confidence = 0.82
