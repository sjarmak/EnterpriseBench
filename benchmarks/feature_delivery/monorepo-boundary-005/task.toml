# Monorepo Boundary: pnpm Lockfile v6 Format Change

difficulty_stratum = "monorepo_cross_package"

[task]
id = "monorepo-boundary-pnpm-lockfile-005"
suite = "feature_delivery"
task_type = "monorepo_boundary"
difficulty = "expert"
estimated_duration_minutes = 60
session_type = "single"
description = "Trace blast radius of lockfile v6 format change through pnpm workspace packages"
prompt = """
For the pnpm v9.0.0 major release, two fundamental changes are being made:

1. `@pnpm/constants` — new lockfile version constant for the v6 format
2. `@pnpm/dependency-path` — registry URL removed from package ID format

These changes affect the core data structures that flow through the entire
pnpm package graph.

Your task:
1. Identify all workspace packages that consume @pnpm/constants or
   @pnpm/dependency-path and would be affected by these format changes.
2. Classify the impact per package as none/patch/minor/major.
3. Identify specific boundary violations — files where lockfile format
   assumptions are encoded.

Write your analysis to /workspace/pnpm/IMPACT_REPORT.md.
"""

[[repos]]
url = "github.com/pnpm/pnpm"
rev = "v8.15.9"
path = "pnpm"
role = "primary"

[metadata]
languages = ["typescript"]
total_loc = 350_000
dependency_depth = 1
frameworks = ["pnpm"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "identify_affected_packages"
weight = 0.25
verifier = "checks/check_affected_packages.sh"
description = "Agent identifies at least 6 of 9 affected packages (lockfile-file, lockfile-utils, lockfile-to-pnp, merge-lockfile-changes, prune-lockfile, filter-lockfile, calc-dep-state, plugin-commands-rebuild, audit)"
timeout_seconds = 90

[[checkpoints]]
name = "classify_change_impact"
weight = 0.45
verifier = "checks/check_impact_classification.sh"
description = "Agent classifies affected packages as major (breaking lockfile format change)"
timeout_seconds = 60

[[checkpoints]]
name = "identify_boundary_violations"
weight = 0.30
verifier = "checks/check_boundary_violations.sh"
description = "Agent identifies constants/src/index.ts, dependency-path/src/index.ts, and lockfile-file/src/write.ts"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["migration_guide"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/monorepo-boundary-pnpm-lockfile-005.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "workspace:* protocol dependencies create a complex internal dependency graph — semantic navigation traces actual package consumption paths that text search misses"

[ground_truth]
tiers = ["deterministic"]

