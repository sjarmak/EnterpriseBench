# DB Schema Evolution: Group-Based Channel Creation Setting (Zulip)

difficulty_stratum = "large_single"

[task]
id = "schema-evolution-003"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "expert"
estimated_duration_minutes = 60
session_type = "single"
description = "Trace impact of replacing a boolean policy with a FK to NamedUserGroup across Zulip's full stack (Python + JS + API)"
prompt = """
We're replacing the integer `create_public_stream_policy` field on the Realm model
with a foreign key `can_create_public_channel_group` pointing to `NamedUserGroup`.
This is a 4-migration sequence:
- 0532: Add the new FK column
- 0533: Backfill from old policy values
- 0534: Alter column constraints
- 0535: Remove old `create_public_stream_policy` column

Your task:
1. Identify all 4 migration files and the model change in `zerver/models/realms.py`.
2. Find all backend code that directly references either the old policy field or the
   new group-based field — actions, views, events.
3. Find all frontend code (JavaScript/TypeScript) that references channel creation
   settings — settings UI, state management, dispatch handlers.
4. Identify test files across both backend and frontend that need updating.

Write your analysis to /workspace/zulip/SCHEMA_IMPACT.md.
"""

[[repos]]
url = "github.com/zulip/zulip"
rev = "faa06497ed09f65dc0c7ba510dc56ebd41fbe037"
path = "zulip"
role = "primary"

[metadata]
languages = ["python", "javascript", "typescript"]
total_loc = 500_000
dependency_depth = 1
frameworks = ["django"]

[[checkpoints]]
name = "identify_schema_change"
weight = 0.10
verifier = "checks/check_schema_change.sh"
description = "Agent identifies all 4 migration files and the model FK change"
timeout_seconds = 60

[[checkpoints]]
name = "find_direct_refs"
weight = 0.35
verifier = "checks/check_direct_refs.sh"
description = "Agent finds backend references: actions, views, events, event_schema"
timeout_seconds = 60

[[checkpoints]]
name = "find_indirect_refs"
weight = 0.35
verifier = "checks/check_indirect_refs.sh"
description = "Agent finds frontend references: settings UI, state data, dispatch, templates"
timeout_seconds = 60

[[checkpoints]]
name = "identify_test_impact"
weight = 0.20
verifier = "checks/check_test_impact.sh"
description = "Agent identifies test files across backend and frontend"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["code_patch"]

[tool_access]
expected_mcp_benefit = "medium"
mcp_benefit_rationale = "Cross-stack tracing from Django model through Python events to JavaScript settings UI; MCP helps bridge backend/frontend but field names and event identifiers are grepable across both stacks"

