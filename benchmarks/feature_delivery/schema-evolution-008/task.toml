# DB Schema Evolution: Auto-Bump Cooldown Days (Discourse)

difficulty_stratum = "large_single"

[task]
id = "schema-evolution-008"
suite = "feature_delivery"
task_type = "db_schema_evolution"
difficulty = "medium"
estimated_duration_minutes = 30
session_type = "single"
description = "Trace impact of adding auto_bump_cooldown_days to CategorySetting with backfill migration in Discourse"
prompt = """
We're adding an `auto_bump_cooldown_days` integer column to `CategorySetting` to
control how frequently topics in a category can be automatically bumped. This is a
two-step migration:
1. `20230301071240_add_auto_bump_cooldown_days_to_category_settings.rb` — adds the column
2. `20230308042434_backfill_auto_bump_cooldown_days_category_setting.rb` — backfills defaults

Your task:
1. Identify both migration files and the model changes.
2. Find direct references — CategorySetting model, Category model, the
   categories controller, and the category serializer.
3. Find indirect references — frontend components (edit-category-settings template,
   category model JS, new-category route), locale strings, and API response JSON schemas.
4. Identify spec and API schema fixture files that need updating.

Write your analysis to /workspace/discourse/SCHEMA_IMPACT.md.
"""

