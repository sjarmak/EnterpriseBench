# Config Drift: ArgoCD app controller defaults vs Helm chart values

difficulty_stratum = "dual_repo"
mcp_suite = "eb_v1"
repo_set_id = "argocd-ecosystem"
org_scale = true
verification_modes = ["deterministic", "llm_curator"]

[task]
id = "config-drift-dual-argocd-001"
suite = "platform_engineering"
task_type = "config_drift"
difficulty = "hard"
estimated_duration_minutes = 30
session_type = "single"
description = "Detect config drift between ArgoCD application controller defaults and argo-helm chart values.yaml overrides"
prompt = """
Your platform team deploys ArgoCD using the official argo-helm Helm chart. After
upgrading to ArgoCD v2.9.0 with argo-helm chart version argo-cd-5.51.0, several
application syncs started failing with timeout errors.

Investigation suggests configuration drift between the ArgoCD application controller's
built-in defaults and the Helm chart's values.yaml overrides. The Helm chart may be
setting values that conflict with or override controller defaults in unexpected ways.

Your task:
1. Examine the ArgoCD application controller's default configuration values in the
   Go source code (look for default constants, config maps, and flag defaults in
   the controller package).
2. Examine the argo-helm chart's values.yaml for the argo-cd chart, focusing on
   controller-related configuration sections.
3. Identify all configuration drift points where the Helm chart values diverge from
   the ArgoCD controller's built-in defaults — particularly around sync timeouts,
   retry settings, resource tracking methods, and health check configurations.
4. For each drift point, document: the ArgoCD default (with source file), the Helm
   override (with values.yaml path), and the potential impact.

Write your analysis to /workspace/DRIFT_REPORT.json with:
{
  "drift_points": [
    {
      "config_key": "<configuration parameter>",
      "argocd_default": "<default value from Go source>",
      "argocd_source_file": "<path in argo-cd repo>",
      "helm_override": "<value in Helm chart>",
      "helm_source_path": "<values.yaml key path>",
      "impact": "<potential impact of this drift>",
      "override_chain": ["source -> intermediate -> final"]
    }
  ]
}
"""

[[repos]]
url = "https://github.com/argoproj/argo-cd"
rev = "v2.9.0"
path = "argo-cd"
role = "primary"

[[repos]]
url = "https://github.com/argoproj/argo-helm"
rev = "argo-cd-5.51.0"
path = "argo-helm"
role = "consumer"

[metadata]
languages = ["go", "yaml"]
total_loc = 450_000
dependency_depth = 2
frameworks = ["argocd", "helm", "kubernetes"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "config_valid"
weight = 0.20
verifier = "checks/check_config_valid.sh"
description = "Agent produces valid configuration analysis"
timeout_seconds = 60

[[checkpoints]]
name = "drift_points"
weight = 0.45
verifier = "checks/check_drift_points.sh"
description = "Agent identifies all drift points across repos"
timeout_seconds = 120

[[checkpoints]]
name = "expected_values"
weight = 0.35
verifier = "checks/check_expected_values.sh"
description = "Agent determines correct expected values"
timeout_seconds = 120

[artifacts]
required = ["answer"]
optional = ["config"]

[tool_access]
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Cross-repo search between Go source defaults and Helm YAML values requires matching config keys across different naming conventions and file formats"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "cmd/argocd-application-controller/commands/argocd_application_controller.go"
repo = "argo-cd"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "charts/argo-cd/values.yaml"
repo = "argo-helm"
confidence = 0.95
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "controller/appcontroller.go"
repo = "argo-cd"
confidence = 0.85

[[ground_truth.sufficient_files]]
path = "util/settings/settings.go"
repo = "argo-cd"
confidence = 0.80
