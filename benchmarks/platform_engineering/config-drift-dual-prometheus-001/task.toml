# Config Drift: Prometheus storage config vs Thanos sidecar expectations

difficulty_stratum = "dual_repo"
mcp_suite = "eb_v1"
repo_set_id = "prometheus-ecosystem"
org_scale = true
verification_modes = ["deterministic", "llm_curator"]

[task]
id = "config-drift-dual-prometheus-001"
suite = "platform_engineering"
task_type = "config_drift"
difficulty = "hard"
estimated_duration_minutes = 30
session_type = "single"
description = "Detect config drift between Prometheus TSDB/storage configuration and Thanos sidecar expected settings"
prompt = """
Your observability team runs Prometheus v2.48.0 with Thanos v0.32.5 sidecar for
long-term storage and global querying. After a Prometheus upgrade, the Thanos sidecar
started logging warnings about unexpected TSDB configuration and occasionally failing
to upload blocks to object storage.

The root cause is suspected to be configuration drift between Prometheus's TSDB/storage
defaults and what the Thanos sidecar expects from its companion Prometheus instance.

Your task:
1. Examine Prometheus's TSDB and storage configuration defaults in the Go source —
   look for flag defaults, TSDB options structs, and storage retention settings.
2. Examine the Thanos sidecar's expectations for Prometheus configuration — what TSDB
   settings does the sidecar validate or depend on (block duration, retention, WAL
   settings, external labels)?
3. Identify all configuration drift points where Prometheus defaults may conflict with
   Thanos sidecar requirements — particularly around min-block-duration, max-block-duration,
   retention policies, and external label requirements.
4. For each drift point, document the Prometheus default, the Thanos expectation, and
   the failure mode when they diverge.

Write your analysis to /workspace/DRIFT_REPORT.json with:
{
  "drift_points": [
    {
      "config_key": "<configuration parameter>",
      "prometheus_default": "<Prometheus default value>",
      "prometheus_source_file": "<path in prometheus repo>",
      "thanos_expectation": "<what Thanos expects>",
      "thanos_source_file": "<path in thanos repo>",
      "failure_mode": "<what happens when they diverge>",
      "override_chain": ["source -> intermediate -> final"]
    }
  ]
}
"""

[[repos]]
url = "https://github.com/prometheus/prometheus"
rev = "v2.48.0"
path = "prometheus"
role = "primary"

[[repos]]
url = "https://github.com/thanos-io/thanos"
rev = "v0.32.5"
path = "thanos"
role = "consumer"

[metadata]
languages = ["go"]
total_loc = 600_000
dependency_depth = 2
frameworks = ["prometheus", "thanos"]
multi_repo_pattern = "enforce"

[[checkpoints]]
name = "config_valid"
weight = 0.20
verifier = "checks/check_config_valid.sh"
description = "Agent produces valid configuration analysis"
timeout_seconds = 60

[[checkpoints]]
name = "drift_points"
weight = 0.45
verifier = "checks/check_drift_points.sh"
description = "Agent identifies all drift points across repos"
timeout_seconds = 120

[[checkpoints]]
name = "expected_values"
weight = 0.35
verifier = "checks/check_expected_values.sh"
description = "Agent determines correct expected values"
timeout_seconds = 120

[artifacts]
required = ["answer"]
optional = ["config"]

[tool_access]
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Cross-repo search needed to match Prometheus TSDB flag names with Thanos sidecar validation code that references those same parameters by different names"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "tsdb/db.go"
repo = "prometheus"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "cmd/thanos/sidecar.go"
repo = "thanos"
confidence = 0.95
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "cmd/prometheus/main.go"
repo = "prometheus"
confidence = 0.85

[[ground_truth.sufficient_files]]
path = "pkg/shipper/shipper.go"
repo = "thanos"
confidence = 0.80
