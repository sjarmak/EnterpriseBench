# RBAC Audit: Harbor robot account wildcard permission gap
# Source: goharbor/harbor Issue #21406, PR #22352

difficulty_stratum = "large_single"

[task]
id = "rbac-audit-003"
suite = "security_operations"
task_type = "incident_investigation"
difficulty = "hard"
estimated_duration_minutes = 35
session_type = "single"
description = "Audit Harbor robot account RBAC for wildcard permission bypass in system-to-project robot creation"
prompt = """
# Task: RBAC Gap Analysis — Harbor Robot Account Wildcard Permissions

## Context
Harbor uses a layered RBAC model for robot accounts: system-level robots can be
granted wildcard permissions (e.g., `/project/*/robot`) to operate across all
projects, while project-level robots are scoped to a single project. A bug
report indicates that system robots with wildcard permissions are getting 403
errors when trying to create project-level robot accounts.

## Objective
Audit the RBAC evaluation chain for robot accounts in Harbor to identify the
permission gap between system-level and project-level robot authorization.

## Steps
1. Locate the robot security context implementation.
   Understand how system robots build their RBAC evaluator chain.
2. Compare how system robots vs project robots configure the RBAC evaluator.
   Look for `filterRobotPolicies` — is it applied consistently?
3. Examine the robot API handler. Trace the `CreateRobot()` flow and the
   `requireAccess()` permission check.
4. Identify the gap: why does a system robot with `/project/*/robot` permission
   fail the RBAC check when creating a project-level robot?
5. Write `/workspace/security_audit.md` documenting:
   - Harbor's robot account RBAC architecture (system vs project robots)
   - The RBAC evaluator chain construction for each robot type
   - The specific gap in `filterRobotPolicies` application
   - The failing permission check path
   - Remediation: what changes to context.go and robot.go would fix this

## Success Criteria
- Describes the system vs project robot RBAC model
- Identifies the filterRobotPolicies gap in evaluator construction
- Traces the CreateRobot permission check flow
- Provides specific remediation steps
"""

