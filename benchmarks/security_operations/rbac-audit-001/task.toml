# RBAC Audit: Calico tier policy authorization bypass
# Source: projectcalico/calico PR #12006

difficulty_stratum = "large_single"

[task]
id = "rbac-audit-001"
suite = "security_operations"
task_type = "incident_investigation"
difficulty = "hard"
estimated_duration_minutes = 40
session_type = "single"
description = "Audit Calico RBAC authorization for policy tier changes — find dual-path authorization bypass"
prompt = """
# Task: RBAC Authorization Audit — Calico Network Policy Tier Changes

## Context
Your security team has received a report that Calico network policies can be
moved between tiers by users who lack permissions on the destination tier. The
suspected root cause is an inconsistency between how the Kubernetes apiserver
and the admission webhook each authorize tier changes.

## Objective
Audit the RBAC authorization logic in Calico's apiserver storage layer and
admission webhook to identify how a user could bypass tier authorization when
updating a network policy's tier assignment.

## Steps
1. Locate the apiserver storage implementations for network policies. Check
   `apiserver/pkg/registry/projectcalico/` for the policy types:
   GlobalNetworkPolicy, NetworkPolicy, StagedGlobalNetworkPolicy, and
   StagedNetworkPolicy.
2. In each storage type's `Update()` method, determine which tier is checked
   for authorization — the old tier, the new tier, or both.
3. Locate the webhook RBAC authorization logic. In the `authorize()` function,
   determine which tier is checked on UPDATE operations — old, new, or both.
4. Identify the authorization gap: if the apiserver only checks one tier and
   the webhook only checks the other, a user can exploit either path.
5. Write `/workspace/security_audit.md` documenting:
   - The affected policy types and their storage files
   - The authorization logic in the apiserver Update() path
   - The authorization logic in the webhook authorize() path
   - The specific bypass scenario (which tier each path misses)
   - Severity assessment and remediation recommendations

## Success Criteria
- Identifies all 4 affected policy types
- Correctly describes the dual-path authorization gap
- References specific files and functions
- Provides remediation recommendations
"""

