# RBAC Audit: Keycloak Bearer token validation bypass (CVE-2026-0707)
# Source: keycloak/keycloak PR #45787, Issue #45649, GHSA-gv94-wp4h-vv8p

difficulty_stratum = "large_single"

[task]
id = "rbac-audit-004"
suite = "security_operations"
task_type = "incident_investigation"
difficulty = "hard"
estimated_duration_minutes = 25
session_type = "single"
description = "Audit Keycloak Authorization header Bearer token validation for RFC 6750 compliance"
prompt = """
# Task: Authentication Header Audit — Keycloak Bearer Token Validation

## Context
CVE-2026-0707 (GHSA-gv94-wp4h-vv8p) affects Keycloak's handling of the
Authorization header with Bearer tokens. The token extraction logic does not
properly validate the Bearer scheme format per RFC 6750, potentially allowing
injection of malformed tokens.

## Objective
Audit the Authorization header parsing in Keycloak's AppAuthManager to identify
RFC 6750 compliance violations and document the attack surface.

## Steps
1. Locate `AppAuthManager.java` in the services module
   (`services/src/main/java/org/keycloak/services/managers/`).
2. Find the method that extracts Bearer tokens from the Authorization header.
3. Check RFC 6750 compliance:
   - Is the "Bearer" scheme validated case-insensitively?
   - Is the separator between "Bearer" and the token strictly a single ASCII
     space?
   - Are non-standard whitespace characters (tabs, zero-width spaces) rejected?
   - Does the token value match the b64token production rule:
     `1*( ALPHA / DIGIT / "-" / "." / "_" / "~" / "+" / "/" ) *"="`?
4. Identify what malformed input could bypass the current validation.
5. Write `/workspace/security_audit.md` documenting:
   - The current token extraction logic
   - Each RFC 6750 violation found
   - Potential attack vectors (token injection, whitespace smuggling)
   - Severity assessment
   - Specific remediation code changes

## Success Criteria
- References AppAuthManager.java
- Identifies at least 2 RFC 6750 violations
- Describes attack vectors
- Provides remediation recommendations
"""

