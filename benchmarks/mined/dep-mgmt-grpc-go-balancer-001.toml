# Ground truth: https://github.com/etcd-io/etcd/pull/11564
# Fix commit: 4258cdd2efdf79a145067ae426f93b9f220c05f1
# Mined from: grpc-go v1.27.0 breaking change affecting etcd clientv3
# Generated by extract_task.py from OSS mining pipeline

[task]
id = "dep-mgmt-grpc-go-balancer-001"
suite = "dependency_management"
difficulty = "hard"
estimated_duration_minutes = 45
session_type = "single"
description = "grpc-go v1.27.0 removed balancer/resolver type aliases, breaking etcd clientv3"
prompt = """
The grpc-go library has released v1.27.0 which contains breaking API changes.
The etcd project depends on grpc-go and its clientv3 package no longer compiles.

In grpc-go v1.27.0, several backward-compatibility type aliases were removed:
- resolver.BuildOption (use resolver.BuildOptions instead)
- resolver.ResolveNowOption (use resolver.ResolveNowOptions instead)
- balancer.PickOptions (use balancer.PickInfo instead)

Your task:
1. Identify all files in etcd's clientv3 package that reference the removed types
2. Update the code to use the new grpc-go v1.27.0 API types
3. Ensure etcd's clientv3 package compiles and tests pass with grpc-go v1.27.0

Both repositories are available under /workspace/.

Hint: Focus on the clientv3/balancer/ directory, particularly the resolver
and picker sub-packages.
"""

[[repos]]
url = "https://github.com/grpc/grpc-go"
rev = "v1.27.0"
path = "grpc-go"
role = "dependency"

[[repos]]
url = "https://github.com/etcd-io/etcd"
rev = "v3.4.7"
path = "etcd"
role = "primary"

[metadata]
languages = ["go"]
dependency_depth = 2
frameworks = ["grpc", "protobuf", "etcd"]
multi_repo_pattern = "propagate"

[[checkpoints]]
name = "identify_affected_files"
weight = 0.20
verifier = "checks/check_identification.sh"
description = "Agent identifies the 4 files in clientv3/balancer/ using removed type aliases"

[[checkpoints]]
name = "update_resolver_types"
weight = 0.25
verifier = "checks/check_resolver_fix.sh"
description = "resolver.BuildOption -> BuildOptions, resolver.ResolveNowOption -> ResolveNowOptions"

[[checkpoints]]
name = "update_balancer_types"
weight = 0.20
verifier = "checks/check_balancer_fix.sh"
description = "balancer.PickOptions -> balancer.PickInfo in picker implementations"

[[checkpoints]]
name = "tests_pass"
weight = 0.35
verifier = "checks/check_tests.sh"
description = "etcd clientv3 package compiles and tests pass with grpc-go v1.27.0"

[artifacts]
required = ["code_patch"]
optional = ["migration_guide"]
