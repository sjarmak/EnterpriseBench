# Ground truth: https://github.com/psf/requests/issues/6432
# Fix version: requests v2.30.0 (commit 2ad18e0e10e7d7ecd5384c378f25ec8821a10a29)
# Mined from: urllib3 2.0.0 breaking change affecting requests
# Generated by extract_task.py from OSS mining pipeline

[task]
id = "dep-mgmt-urllib3-requests-001"
suite = "dependency_management"
difficulty = "hard"
estimated_duration_minutes = 60
session_type = "single"
description = "urllib3 2.0 breaks requests: version pin and deprecated API removal"
prompt = """
The urllib3 library has released version 2.0.0, a major version bump with breaking changes.
The requests library depends on urllib3 but currently pins to urllib3<1.27, which excludes
urllib3 2.0 entirely.

Key breaking changes in urllib3 2.0.0:
- Dropped support for Python <3.7
- Removed deprecated APIs (e.g., urllib3.contrib.pyopenssl, Retry.DEFAULT_REDIRECT)
- Changed SSL/TLS defaults (requires OpenSSL 1.1.1+)
- HTTPResponse.read() now returns bytes consistently (no more text mode)
- Removed urllib3.request module (use urllib3.PoolManager directly)

Your task:
1. Update the requests version pin in setup.cfg to allow urllib3>=2.0.0
2. Identify all uses of deprecated urllib3 APIs in the requests codebase
3. Update requests code to be compatible with both urllib3 1.26.x and 2.0.x
4. Ensure requests test suite passes with urllib3 2.0.0

Both repositories are available under /workspace/.

Note: The goal is compatibility with urllib3 2.0 while maintaining backward
compatibility with urllib3 1.26.x where feasible.
"""

[[repos]]
url = "https://github.com/urllib3/urllib3"
rev = "2.0.0"
path = "urllib3"
role = "dependency"

[[repos]]
url = "https://github.com/psf/requests"
rev = "v2.28.2"
path = "requests"
role = "primary"

[metadata]
languages = ["python"]
dependency_depth = 2
frameworks = ["urllib3", "requests", "http"]
multi_repo_pattern = "propagate"

[[checkpoints]]
name = "update_version_pin"
weight = 0.15
verifier = "checks/check_version_pin.sh"
description = "setup.cfg urllib3 pin updated to allow >=2.0.0"

[[checkpoints]]
name = "identify_deprecated_apis"
weight = 0.20
verifier = "checks/check_deprecated_apis.sh"
description = "Agent identifies deprecated urllib3 API usage in requests codebase"

[[checkpoints]]
name = "update_api_calls"
weight = 0.30
verifier = "checks/check_api_updates.sh"
description = "Deprecated urllib3 API calls updated to 2.0-compatible equivalents"

[[checkpoints]]
name = "tests_pass"
weight = 0.35
verifier = "checks/check_tests.sh"
description = "requests test suite passes with urllib3 2.0.0"

[artifacts]
required = ["code_patch"]
optional = ["migration_guide"]
