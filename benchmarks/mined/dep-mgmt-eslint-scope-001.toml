# Ground truth: https://github.com/typescript-eslint/typescript-eslint/pull/11914
# Fix commit: 607c9c9f3fd82f51124094ce944f55204a78ebe5
# Mined from: ESLint v10 breaking change affecting typescript-eslint scope manager
# Generated by extract_task.py from OSS mining pipeline

[task]
id = "dep-mgmt-eslint-scope-001"
suite = "dependency_management"
difficulty = "hard"
estimated_duration_minutes = 45
session_type = "single"
description = "ESLint v10 requires addGlobals() in ScopeManager, breaking typescript-eslint"
prompt = """
ESLint v10.0.0 has been released with a breaking change to the ScopeManager interface.
The @typescript-eslint/scope-manager package does not implement the new required method,
causing a crash before any rules execute in TypeScript projects using ESLint v10.

Breaking changes in ESLint v10:
- ScopeManager must implement addGlobals(names: string[]) instance method
- addGlobals creates variables in the global scope for the given names and resolves
  references to them
- eslint-scope v9.0.0 already implements this; custom scope managers must follow
- Without this method, ESLint throws: TypeError: scopeManager.addGlobals is not a function

Your task:
1. Understand how eslint-scope v9.0.0 implements addGlobals in its ScopeManager
2. Port the addGlobals implementation to @typescript-eslint/scope-manager
3. Update ScopeManager.ts, GlobalScope.ts, and ScopeBase.ts as needed
4. Ensure typescript-eslint's scope-manager tests pass with ESLint v10

Both repositories are available under /workspace/.

Hint: Look at eslint/eslint-scope for the reference implementation of addGlobals,
then adapt it for typescript-eslint's scope manager architecture.
"""

[[repos]]
url = "https://github.com/eslint/eslint"
rev = "v10.0.0"
path = "eslint"
role = "dependency"

[[repos]]
url = "https://github.com/typescript-eslint/typescript-eslint"
rev = "v8.20.0"
path = "typescript-eslint"
role = "primary"

[metadata]
languages = ["typescript"]
dependency_depth = 2
frameworks = ["eslint", "typescript-eslint"]
multi_repo_pattern = "propagate"

[[checkpoints]]
name = "understand_eslint_scope_api"
weight = 0.15
verifier = "checks/check_api_understanding.sh"
description = "Agent identifies the addGlobals contract from eslint-scope v9.0.0"

[[checkpoints]]
name = "implement_addGlobals"
weight = 0.40
verifier = "checks/check_add_globals.sh"
description = "addGlobals(names) method implemented in ScopeManager.ts with global scope variable creation"

[[checkpoints]]
name = "update_scope_classes"
weight = 0.15
verifier = "checks/check_scope_updates.sh"
description = "GlobalScope.ts and ScopeBase.ts updated to support the new method"

[[checkpoints]]
name = "tests_pass"
weight = 0.30
verifier = "checks/check_tests.sh"
description = "typescript-eslint scope-manager tests pass with ESLint v10.0.0"

[artifacts]
required = ["code_patch"]
optional = ["migration_guide"]
