# API Contract Boundary: Envoy xDS v2 API deprecation and removal

difficulty_stratum = "multi_repo"
mcp_suite = "eb_v1"
repo_set_id = "envoy-ecosystem"
org_scale = true
verification_modes = ["deterministic", "llm_curator"]

[task]
id = "api-contract-envoy-xds-v2-006"
suite = "dependency_management"
task_type = "api_contract"
difficulty = "expert"
estimated_duration_minutes = 60
session_type = "single"
description = "Trace impact of Envoy xDS v2 API deprecation through go-control-plane into istio"
prompt = """
The Envoy project deprecated xDS v2 APIs, making v2 transport fatal-by-default
(envoy PR #14223, 114 files) and later removing v2 override capability entirely
(#15481). This affects all control planes using the Go control plane library
to communicate with Envoy.

Your task:
1. Identify the xDS v2 proto types in envoy that were deprecated/removed.
2. Find the go-control-plane v2 removal (PR #415, 78 files) — which
   packages were removed and what replaced them.
3. Trace the impact into istio's pilot component — find all files in
   istio that referenced v2 xDS types and needed migration to v3.
4. Map the three-repo chain: envoy (proto definitions) → go-control-plane
   (Go bindings) → istio (control plane implementation).

Write your analysis to /workspace/analysis/IMPACT_REPORT.md.
"""

[[repos]]
url = "https://github.com/envoyproxy/envoy"
rev = "v1.18.0"
path = "envoy"
role = "primary"

[[repos]]
url = "https://github.com/envoyproxy/go-control-plane"
rev = "v0.9.8"
path = "go-control-plane"
role = "consumer"

[[repos]]
url = "https://github.com/istio/istio"
rev = "1.6.0"
path = "istio"
role = "consumer"

[metadata]
languages = ["go", "c++", "protobuf"]
total_loc = 3_000_000
dependency_depth = 3
frameworks = ["envoy", "istio", "grpc"]
multi_repo_pattern = "propagate"

[[checkpoints]]
name = "identify_breaking_api"
weight = 0.15
verifier = "checks/check_source_identification.sh"
description = "Agent identifies xDS v2 deprecation in envoy"
timeout_seconds = 60

[[checkpoints]]
name = "find_direct_consumers"
weight = 0.35
verifier = "checks/check_direct_consumers.sh"
description = "Agent finds go-control-plane and istio v2 usage"
timeout_seconds = 120

[[checkpoints]]
name = "trace_transitive_impact"
weight = 0.30
verifier = "checks/check_transitive_impact.sh"
description = "Agent traces envoy → go-control-plane → istio chain"
timeout_seconds = 120

[[checkpoints]]
name = "classify_breakage"
weight = 0.20
verifier = "checks/check_classification.sh"
description = "Agent identifies runtime fatal vs compile error distinction"
timeout_seconds = 60

[artifacts]
required = ["answer"]
optional = ["migration_guide"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/api-contract-envoy-xds-v2-006.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Three-repo proto definition chain requires tracing xDS type references from Envoy proto files through Go bindings into istio pilot implementation"

