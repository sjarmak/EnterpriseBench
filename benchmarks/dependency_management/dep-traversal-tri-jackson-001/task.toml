# Dependency Graph Traversal: Jackson ObjectMapper through Spring Framework into Spring Boot autoconfiguration

difficulty_stratum = "tri_repo"
mcp_suite = "eb_v1"
repo_set_id = "spring-jackson-ecosystem"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "dep-traversal-tri-jackson-001"
suite = "dependency_management"
task_type = "dependency_graph"
difficulty = "hard"
estimated_duration_minutes = 35
session_type = "single"
description = "Trace Jackson ObjectMapper integration through Spring Framework's HTTP message converters into Spring Boot's JacksonAutoConfiguration"
prompt = """
Your platform team needs to understand how Jackson's ObjectMapper customization
propagates through the Spring stack. A developer added a custom Jackson module
to their Spring Boot application, but the module's serializers are not being
picked up by REST endpoints. You need to trace the full dependency and
configuration chain.

Your task:
1. In jackson-databind, find the ObjectMapper class and understand how modules
   are registered (registerModule) and how serializers/deserializers are resolved
   during JSON processing.
2. In spring-framework, find MappingJackson2HttpMessageConverter and trace how
   it creates/configures its internal ObjectMapper. Identify where Spring's
   Jackson2ObjectMapperBuilder hooks into module auto-discovery.
3. In spring-boot, find JacksonAutoConfiguration and trace how it auto-detects
   Jackson Module beans from the ApplicationContext and registers them with the
   ObjectMapper. Map the full autoconfiguration chain:
   JacksonAutoConfiguration -> Jackson2ObjectMapperBuilderCustomizer ->
   Jackson2ObjectMapperBuilder -> ObjectMapper.
4. Produce the complete dependency trace showing how a custom Module bean flows
   from Spring Boot autoconfiguration through Spring Framework's builder into
   Jackson's ObjectMapper.

Write your analysis to /workspace/DEPENDENCY_TRACE.md with:
- Full class/method chain from Jackson Module registration to REST serialization
- Spring Boot autoconfiguration entry points
- Spring Framework builder integration points
- Key configuration files from each repo
"""

