# API Contract Boundary: Protobuf v2 migration runtime behavior change

difficulty_stratum = "large_single"

[task]
id = "api-contract-protobuf-v2-005"
suite = "dependency_management"
task_type = "api_contract"
difficulty = "expert"
estimated_duration_minutes = 50
session_type = "single"
description = "Trace the runtime behavior change caused by protobuf v2 migration in grpc-go status.Details()"
prompt = """
The gRPC-Go team migrated from `github.com/golang/protobuf` to
`google.golang.org/protobuf/proto` (PR #6919, 68 files). This migration
introduced a subtle runtime behavior change in `status.Details()`:

Previously, `Status.Details()` returned types implementing `MessageV1`
(via `ptypes.UnmarshalAny`). After migration, it returns `MessageV2`
types (via `anypb.Any.UnmarshalNew()`). Type assertions against
MessageV1 concrete types silently fail.

Your task:
1. Trace the change in the internal status implementation — what function call
   changed and how it affects the return type.
2. Identify all files in grpc-go that call `Status.Details()` or
   `Status.WithDetails()` and may be affected.
3. Find the incompatibility fix PR (#7724) and explain what it changed.
4. Assess the broader consumer impact — any gRPC-Go user with code
   generated from protoc-gen-go < v1.4 would be affected.

Write your analysis to /workspace/analysis/IMPACT_REPORT.md.
"""

