# Dependency Graph Traversal: golang.org/x/net HPACK DoS across HashiCorp + Prometheus

difficulty_stratum = "multi_repo"

[task]
id = "dep-traversal-005"
suite = "dependency_management"
task_type = "dependency_graph"
difficulty = "hard"
estimated_duration_minutes = 35
session_type = "single"
description = "Trace CVE-2022-41723 (HPACK DoS) blast radius through prometheus, consul, and vault"
prompt = """
CVE-2022-41723 affects `golang.org/x/net` versions prior to 0.7.0 — a denial of
service via HPACK header compression in HTTP/2 servers. A malicious client can
cause the server to consume excessive memory.

Your task:
1. Identify the CVE and confirm the affected module and version range.
2. Find all direct dependents of golang.org/x/net in the workspace repos
   (prometheus, consul, vault).
3. Trace dependency paths. Each repo may depend on x/net directly and also
   transitively through other modules (e.g., grpc-go). Map both direct and
   transitive paths.
4. For each repo, determine the resolved x/net version and classify as affected
   or patched. Note: vault and consul may have different update cadences.

Write your analysis to /workspace/BLAST_RADIUS.md.
"""

[[repos]]
url = "https://github.com/prometheus/prometheus"
rev = "v2.45.0"
path = "prometheus"
role = "consumer"

[[repos]]
url = "https://github.com/hashicorp/consul"
rev = "v1.16.0"
path = "consul"
role = "consumer"

[[repos]]
url = "https://github.com/hashicorp/vault"
rev = "v1.14.0"
path = "vault"
role = "consumer"

[metadata]
languages = ["go"]
total_loc = 2800000
dependency_depth = 2
frameworks = ["prometheus", "consul", "vault"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "identify_cve"
weight = 0.10
verifier = "checks/check_cve_id.sh"
description = "Agent correctly identifies CVE-2022-41723 and x/net < 0.7.0"
timeout_seconds = 30

[[checkpoints]]
name = "find_direct_deps"
weight = 0.30
verifier = "checks/check_direct_deps.sh"
description = "Agent finds all three repos depend on x/net"
timeout_seconds = 60

[[checkpoints]]
name = "trace_transitive_paths"
weight = 0.35
verifier = "checks/check_transitive_paths.sh"
description = "Agent maps direct and transitive dependency paths per repo"
timeout_seconds = 60

[[checkpoints]]
name = "version_analysis"
weight = 0.25
verifier = "checks/check_version_analysis.sh"
description = "Agent determines resolved versions and patch status per repo"
timeout_seconds = 60

[artifacts]
required = ["answer", "security_assessment"]
optional = ["code_patch"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/dep-traversal-005.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Three large Go codebases with deep module graphs — Sourcegraph dependency indexing accelerates go.mod/go.sum traversal"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "go.mod"
repo = "prometheus"
confidence = 0.98
source = "deterministic"

[[ground_truth.required_files]]
path = "go.mod"
repo = "consul"
confidence = 0.98
source = "deterministic"

[[ground_truth.required_files]]
path = "go.mod"
repo = "vault"
confidence = 0.98
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "go.sum"
repo = "prometheus"
confidence = 0.85

[[ground_truth.sufficient_files]]
path = "go.sum"
repo = "consul"
confidence = 0.85
