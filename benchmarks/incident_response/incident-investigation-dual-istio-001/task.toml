# Incident Investigation: Istio/Envoy Service Mesh Routing Failure

difficulty_stratum = "dual_repo"
mcp_suite = "eb_v1"
repo_set_id = "service-mesh-ecosystem"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "incident-investigation-dual-istio-001"
suite = "incident_response"
task_type = "incident_investigation"
difficulty = "hard"
estimated_duration_minutes = 45
session_type = "single"
description = "Trace a service mesh 503 routing failure from Istio VirtualService configuration through to Envoy filter chain"
prompt = """
After upgrading Istio from 1.19 to 1.20, a production service mesh began
returning intermittent 503 errors for a subset of HTTP requests. The affected
requests target a specific VirtualService that uses header-based routing with
regex matching to direct traffic between canary and stable deployments.

Symptoms:
- 503 UC (Upstream Connection) errors in Envoy access logs
- Only affects routes using regex header matching in VirtualService
- Stable routes with exact header matching are unaffected
- The issue appeared immediately after the Istio control plane upgrade
- Envoy sidecars show the routes in their config dump, but matching fails

Investigation notes:
- The VirtualService uses `headers: { x-canary: { regex: "^true$" } }` matching
- Istio 1.20 changed the default regex engine configuration for Envoy
- The Envoy route configuration is generated by Istio Pilot's route translation
- Envoy's RouteMatch uses `safe_regex` with a configurable engine

Your task:
1. Find where Istio Pilot translates VirtualService HTTPRoute header matching
   into Envoy route configuration — identify the route translation code.
2. Find where Envoy evaluates regex-based header matching in the router — trace
   the filter chain from route matching to upstream connection.
3. Trace the full failure chain: VirtualService config → Pilot route translation
   → Envoy route config → regex header matching → 503 response.
4. Identify what changed in Istio 1.20 that affects regex engine configuration
   and how it interacts with Envoy's route matching behavior.

Write your incident report to /workspace/istio/INCIDENT_REPORT.md with:
- Root cause identification (file and function)
- Full error chain from config to 503
- Affected service mesh components
- Remediation steps
"""

[[repos]]
url = "https://github.com/istio/istio"
rev = "1.20.0"
path = "istio"
role = "primary"

[[repos]]
url = "https://github.com/envoyproxy/envoy"
rev = "v1.28.0"
path = "envoy"
role = "upstream"

[metadata]
languages = ["go", "cpp"]
total_loc = 4_500_000
dependency_depth = 2
frameworks = ["istio", "envoy"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "root_cause_identification"
weight = 0.35
verifier = "checks/check_root_cause.sh"
description = "Agent identifies Istio Pilot route translation code and the regex engine config change"
timeout_seconds = 120

[[checkpoints]]
name = "error_chain_trace"
weight = 0.30
verifier = "checks/check_error_chain.sh"
description = "Agent traces VirtualService → Pilot route translation → Envoy route config → regex match failure → 503"
timeout_seconds = 120

[[checkpoints]]
name = "affected_components"
weight = 0.15
verifier = "checks/check_affected_components.sh"
description = "Agent identifies affected Envoy filter chain components and VirtualService patterns"
timeout_seconds = 60

[[checkpoints]]
name = "remediation_proposal"
weight = 0.20
verifier = "checks/check_remediation.sh"
description = "Agent proposes fix for regex engine configuration or VirtualService migration"
timeout_seconds = 60

[artifacts]
required = ["incident_report"]
optional = ["config"]

[tool_access]
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Tracing route configuration translation from Istio Go code to Envoy C++ filter chain requires cross-repo symbol search across language boundaries"

[ground_truth]
tiers = ["deterministic"]

[[ground_truth.required_files]]
path = "pilot/pkg/networking/core/v1alpha3/route/route.go"
repo = "istio"
confidence = 0.95
source = "deterministic"

[[ground_truth.required_files]]
path = "source/common/router/config_impl.cc"
repo = "envoy"
confidence = 0.90
source = "deterministic"

[[ground_truth.sufficient_files]]
path = "pilot/pkg/networking/core/v1alpha3/httproute.go"
repo = "istio"
confidence = 0.80

[[ground_truth.sufficient_files]]
path = "source/common/http/header_utility.cc"
repo = "envoy"
confidence = 0.75
