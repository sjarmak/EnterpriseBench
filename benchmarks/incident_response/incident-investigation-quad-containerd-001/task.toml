rev = "v1.33.0-alpha.2"
path = "kubernetes"
role = "consumer"

[[repos]]
url = "https://github.com/containerd/containerd"
rev = "v1.7.24"
path = "containerd"
role = "intermediary"

[[repos]]
url = "https://github.com/opencontainers/runc"
rev = "v1.2.4"
path = "runc"
role = "upstream"

[[repos]]
url = "https://github.com/moby/moby"
rev = "v28.0.0"
path = "moby"
role = "dependency"

[metadata]
languages = ["go"]
total_loc = 3_500_000
dependency_depth = 4
frameworks = ["kubernetes", "containerd", "runc", "docker"]
multi_repo_pattern = "investigate"

