# Incident Investigation: CRI Seccomp Profile Chain Failure (kubelet -> containerd -> runc -> moby)

difficulty_stratum = "multi_repo"
mcp_suite = "eb_v1"
repo_set_id = "container-runtime-ecosystem"
org_scale = true
verification_modes = ["deterministic"]

[task]
id = "incident-investigation-quad-containerd-001"
suite = "incident_response"
task_type = "incident_investigation"
difficulty = "expert"
estimated_duration_minutes = 75
session_type = "single"
description = "Trace a CRI seccomp profile handling failure across kubelet, containerd, runc, and moby when a custom seccomp profile causes containers to fail with 'operation not permitted' errors"
prompt = """
Your platform team has received multiple reports from application developers
that pods with custom seccomp profiles are failing to start after a cluster
upgrade. The containers crash immediately with cryptic errors:

  ERROR: container_linux.go: starting container process caused:
    seccomp: unable to apply seccomp profile: operation not permitted

  WARN: seccomp filter did not recognize syscall: clone3
    action=SCMP_ACT_ERRNO errno=EPERM

The cluster was recently upgraded to Kubernetes v1.33 with containerd v1.7.24
as the CRI runtime, runc v1.2.4 as the OCI runtime, and Docker/moby v28.0.0
for image building. The issue affects ONLY pods that specify a custom seccomp
profile in their SecurityContext — pods using the RuntimeDefault profile work
fine.

Investigation notes from the on-call engineer:
- The custom seccomp profile whitelists a set of syscalls and blocks all others
- The profile was authored against the older kernel (5.10) and does not include
  newer syscalls like clone3, close_range, or openat2
- kubelet converts the pod seccomp annotation/field into a CRI
  LinuxContainerSecurityContext and sends it to containerd
- containerd's CRI plugin maps the seccomp profile into the OCI runtime spec
- runc reads the OCI spec seccomp section and builds a BPF filter
- moby provides the default seccomp profile that works; the custom profile
  is based on an older version of moby's defaults

The repos are available at:
- /workspace/kubernetes/ — kubelet and CRI integration
- /workspace/containerd/ — CRI plugin and seccomp handling
- /workspace/runc/ — libcontainer seccomp BPF filter generation
- /workspace/moby/ — default seccomp profile and loading utilities

Your task:
1. Identify how kubelet converts pod seccomp profiles into CRI requests —
   find the specific file and function in the kubelet that handles
   SecurityContext seccomp profile conversion.
2. Trace how containerd's CRI plugin processes the seccomp profile from
   the CRI request into the OCI runtime spec — identify where the
   profile is parsed and applied.
3. Find where runc's libcontainer generates the BPF seccomp filter from
   the OCI spec — identify how unknown syscalls are handled and how the
   filter action is determined.
4. Identify moby's default seccomp profile definition and how it differs
   from the custom profile — find where new syscalls like clone3 are
   included in the defaults.
5. Trace the full error chain: how does the seccomp failure propagate
   from runc's BPF filter back through containerd to the kubelet error
   visible to the user?

Write your incident report to /workspace/moby/INCIDENT_REPORT.md with:
- Root cause identification (file and function in each repo)
- Full seccomp profile processing chain across all four repos
- Comparison of default vs custom profile handling
- Remediation steps for updating custom seccomp profiles
"""

