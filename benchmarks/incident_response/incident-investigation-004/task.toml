# Incident Investigation: Docker Save Produces Incomplete Image Archives with Missing Layer Blobs

difficulty_stratum = "dual_repo"
mcp_suite = "eb_v1"
repo_set_id = "docker-ecosystem"
org_scale = true
verification_modes = ["deterministic", "llm_curator"]

[task]
id = "incident-inv-docker-shutdown-004"
suite = "incident_response"
task_type = "incident_investigation"
difficulty = "hard"
estimated_duration_minutes = 45
session_type = "single"
description = "Trace root cause of docker save producing incomplete image archives when images share layers, involving containerd unpack and content store interaction"
prompt = """
Your operations team manages an air-gapped deployment pipeline. Images are
pulled on an internet-connected staging host, exported with `docker save`,
transferred to air-gapped production servers, and loaded with `docker load`.

Recently, production deployments started failing. When operators load the
exported archive and try to run the container, it fails:

  ERROR: failed to register layer: open /var/lib/docker/tmp/rootfs123/layer.tar: no such file or directory

Investigation on the staging host shows that `docker save` produces archives
with missing layer blobs. The issue only happens for images that share base
layers with other images already present on the host. Specifically:

  1. Pull image-A (e.g., python:3.11-slim) — docker save works fine
  2. Pull image-B (e.g., python:3.12-slim, shares base layers with image-A) —
     docker save produces an archive where shared layers have 0-byte or
     missing blob entries

The staging host uses Docker with the containerd image store (containerd
snapshotter) enabled. Examining the content store directory shows that layer
blobs for the shared layers are indeed absent:

  $ ctr -n moby content ls | grep sha256:abc123
  (no output — blob missing from content store)

  $ ctr -n moby snapshots ls | grep sha256:abc123
  sha256:abc123   Committed   ...
  (snapshot exists — filesystem was extracted)

The layer's snapshot (extracted filesystem) exists in the snapshotter, but
the compressed layer blob is missing from the content store. This means
operations that need the original blob (save, push) fail silently or produce
incomplete results.

The Docker daemon source is at /workspace/moby/ and the containerd source
is at /workspace/containerd/.

Your task:
1. Identify the root cause: why are layer blobs missing from the content
   store when snapshots exist? Which code path skips fetching layer content?
2. Trace the full flow: from the image pull request through the containerd
   unpack logic to the content store, explaining where and why layer blobs
   are skipped for already-unpacked layers.
3. List all affected components across both repositories.
4. Propose the correct remediation.

Write your incident report to /workspace/moby/INCIDENT_REPORT.md.
"""

[[repos]]
url = "https://github.com/moby/moby"
rev = "v28.0.0"
path = "moby"
role = "primary"

[[repos]]
url = "https://github.com/containerd/containerd"
rev = "v1.7.24"
path = "containerd"
role = "dependency"

[metadata]
languages = ["go"]
total_loc = 800_000
dependency_depth = 2
frameworks = ["docker", "containerd"]
multi_repo_pattern = "investigate"

[[checkpoints]]
name = "root_cause_identification"
weight = 0.35
verifier = "checks/check_root_cause.sh"
description = "Agent identifies the containerd unpacker early-return that skips layer content fetch when snapshot exists"
timeout_seconds = 60

[[checkpoints]]
name = "error_chain_trace"
weight = 0.30
verifier = "checks/check_error_chain.sh"
description = "Agent traces: pullTag -> WithPullUnpack -> containerd unpacker -> snapshot Stat/Prepare early return -> content store missing blob -> ExportImage/WithSkipMissing"
timeout_seconds = 60

[[checkpoints]]
name = "affected_services"
weight = 0.15
verifier = "checks/check_affected_services.sh"
description = "Agent identifies image_pull.go, image_exporter.go, unpacker.go, content store, and snapshotter"
timeout_seconds = 60

[[checkpoints]]
name = "remediation_proposal"
weight = 0.20
verifier = "checks/check_remediation.sh"
description = "Agent proposes not using WithPullUnpack for local snapshotters, or ensuring content fetch even when snapshot exists"
timeout_seconds = 60

[artifacts]
required = ["incident_report"]
optional = ["code_patch"]

[tool_access]
sourcegraph_mirror_config = "configs/sg_mirrors/incident-inv-docker-shutdown-004.json"
expected_mcp_benefit = "high"
mcp_benefit_rationale = "Cross-repo tracing from moby's image pull through containerd's unpack/content pipeline requires navigating the pull options, unpacker snapshot logic, and content store interaction; MCP cross-repo search is critical for connecting WithPullUnpack in moby to the snapshot-exists early return in containerd's unpacker"

